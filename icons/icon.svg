<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </linearGradient>
    <linearGradient id="tip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>
  <!-- motion blur trail -->
  <rect x="10" y="70" width="80" height="14" rx="4" fill="#FFE066" opacity="0.35" filter="url(#blur)"/>
  <rect x="20" y="74" width="60" height="8" rx="3" fill="#FFD700" opacity="0.25" filter="url(#blur)"/>
  <!-- marker body -->
  <rect x="30" y="28" width="72" height="32" rx="6" fill="url(#body)" transform="rotate(-15 66 44)"/>
  <!-- marker tip -->
  <polygon points="30,56 18,72 38,64" fill="url(#tip)" transform="rotate(-15 28 64)"/>
  <!-- highlight line -->
  <rect x="14" y="90" width="100" height="10" rx="5" fill="#FFE066" opacity="0.85"/>
  <!-- speed lines -->
  <line x1="8" y1="42" x2="24" y2="38" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="6" y1="52" x2="22" y2="50" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <line x1="10" y1="62" x2="24" y2="60" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
</svg>
