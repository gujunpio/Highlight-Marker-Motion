<!DOCTYPE html>
<html data-theme="light">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="header">
        <span class="logo">✦</span>
        <h1>Highlight Motion</h1>
        <div class="header-actions">
            <button id="themeToggle" class="icon-btn" title="Toggle dark/light mode">☀️</button>
            <button id="popOutBtn" class="icon-btn" title="Mở bảng điều khiển thành cửa sổ nổi">↗️</button>
        </div>
    </div>

    <div class="card">
        <div class="row">
            <label>🎨 Highlight</label>
            <div class="color-pair">
                <input type="text" id="bgColor" placeholder="#ffff00">
                <input type="color" id="bgColorPicker" value="#ffff00">
            </div>
        </div>
        <div class="row">
            <label>🔤 Text</label>
            <div class="color-pair">
                <input type="text" id="textColor" placeholder="#000000">
                <input type="color" id="textColorPicker" value="#000000">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="row">
            <label>⚡ Speed</label>
            <select id="speed">
                <option value="slow">Slow</option>
                <option value="medium" selected>Medium</option>
                <option value="fast">Fast</option>
            </select>
        </div>
        <div class="row">
            <label>✨ Style</label>
            <select id="animStyle">
                <option value="sequential" selected>Sequential</option>
                <option value="overlapping">Overlapping</option>
            </select>
        </div>
        <div class="row" id="delayRow" style="display:none;">
            <label>⏱️ Line Delay</label>
            <div class="input-unit">
                <input type="number" id="lineDelay" value="0.2" step="0.1" min="0" style="width:70px">
                <span class="unit">s</span>
            </div>
        </div>
        <div class="row">
            <label>📐 Thickness</label>
            <select id="thickness">
                <option value="thin">Thin</option>
                <option value="medium" selected>Medium</option>
                <option value="thick">Thick</option>
            </select>
        </div>
    </div>

    <div class="action-bar">
        <div class="action-col">
            <button id="btnPlay" class="btn-primary">▶ Play</button>
            <span class="shortcut-hint">Ctrl+Shift+U</span>
        </div>
        <div class="action-col">
            <button id="btnClear" class="btn-secondary">✕ Clear</button>
            <span class="shortcut-hint">Ctrl+Shift+Z</span>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
